name: Construire APK Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remix-studio-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérifier la fluidité, la timeline et l’aperçu vidéo
        run: node tests/smoke.mjs

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer Android 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Vérifier le projet Gradle
        run: gradle projects --no-daemon

      - name: Construire l’APK avec CameraX
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Préparer le fichier à télécharger
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/RemixStudio.apk
          sha256sum release/RemixStudio.apk > release/RemixStudio.apk.sha256

      - name: Conserver l’APK dans les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: Remix-Studio-APK
          path: |
            release/RemixStudio.apk
            release/RemixStudio.apk.sha256
          retention-days: 90
          if-no-files-found: error

      - name: Publier la dernière version téléchargeable
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-apk --yes --cleanup-tag || true
          gh release create latest-apk \
            release/RemixStudio.apk \
            release/RemixStudio.apk.sha256 \
            --title "Remix Studio APK 2.5 – fluidité générale" \
            --notes "Version 2.5 : défilement et pincement plus fluides, suppression du double traitement de la timeline, aperçu vidéo réactif, miniatures générées en arrière-plan et transitions entre clips préchargées. Toutes les fonctions de la version 2.4 sont conservées."

      - name: Enregistrer la réussite de la construction
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          printf '{\n  "status": "success",\n  "version": "2.5.0",\n  "native_camera": true,\n  "single_timeline": true,\n  "original_ratio_preview": true,\n  "touch_timeline_zoom": true,\n  "performance_optimized": true,\n  "export": "1080p",\n  "commit": "%s",\n  "built_at": "%s"\n}\n' "$GITHUB_SHA" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > build-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-status.json
          git commit -m "Confirmer la construction APK fluidité 2.5 [skip ci]" || exit 0
          git push
